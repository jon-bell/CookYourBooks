name: Mobile

on:
  # Push to main: fire on every change. The iOS app embeds apps/web/dist,
  # so any web change is effectively a mobile change — users on
  # TestFlight don't see new web code until a new IPA ships. Cheaper to
  # auto-ship than to remember to dispatch manually.
  push:
    branches: [main]
  # PRs: only fire the smoke build when the native wrapper or its
  # immediate web bridge changes. Web-only PRs are covered by ci.yml.
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'apps/web/src/import/camera.ts'
      - 'apps/web/src/share/share.ts'
      - 'apps/web/src/pages/CookModePage.tsx'
      - '.github/workflows/mobile.yml'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Native platform to build'
        required: true
        default: sync
        type: choice
        options: [sync, ios, ios-release, android]

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  capacitor-sync:
    name: Capacitor sync (Linux)
    runs-on: ripley-cloud-linux-x64
    timeout-minutes: 15
    # Always runs on push/PR. Confirms the web build + capacitor config
    # stay consistent without needing Xcode or the Android SDK.
    steps:
      - uses: actions/checkout@v4

      # pnpm version resolved from root package.json's `packageManager`.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Turbo outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter @cookyourbooks/web build

      - name: Capacitor sync (no platform)
        # `cap sync` without native projects under `ios/` or `android/`
        # prints skip warnings but still validates capacitor.config.ts and
        # the webDir reference. Exits 0 as long as the config parses.
        run: pnpm --filter @cookyourbooks/mobile exec cap sync

  ios:
    name: Build iOS (signed, ship to TestFlight on push to main)
    # Runs on:
    #   - PRs touching mobile code  → unsigned simulator build (sanity check)
    #   - push to main              → fastlane beta (auto-ship to TestFlight)
    #   - workflow_dispatch=ios     → same as PR (unsigned simulator)
    #   - workflow_dispatch=ios-release → fastlane release (App Store submit)
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'ios' || inputs.platform == 'ios-release'))
    runs-on: [self-hosted, macOS, X64, cyb-mac]
    timeout-minutes: 45
    env:
      LANG: en_US.UTF-8
      # Fastlane secrets — see .github/RUNNERS.md for how these are stored.
      # Pod/fastlane steps below prefix commands with `env -u GEM_PATH -u
      # GEM_HOME -u RUBY_VERSION -u MY_RUBY_HOME -u IRBRC -u rvm_path` to
      # strip RVM pollution that breaks brew-installed cocoapods/fastlane.
      # We can't blank these at the job level (empty string ≠ unset; an
      # empty GEM_PATH stops Ruby from finding minitest under cocoapods).
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      # Sentry dSYM upload. Org + project slugs aren't sensitive — only
      # the auth token is. Org is `cyb`, the iOS/Capacitor project is
      # `cyb-capacitor` (these match the Fastfile defaults; set here
      # explicitly so the env is self-documenting).
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: cyb
      SENTRY_PROJECT_MOBILE: cyb-capacitor
      # The web build feeding `cap sync` ships inside the IPA, and its JS
      # errors report to the Capacitor project — so its source maps must
      # upload there too, not to the web project. @sentry/vite-plugin
      # reads SENTRY_PROJECT; point it at the Capacitor project for this
      # build. (Native dSYMs use SENTRY_PROJECT_MOBILE above — same slug.)
      SENTRY_PROJECT: cyb-capacitor
      # Tag both the uploaded maps and the runtime JS events with the
      # commit SHA so they line up by release as well as by Debug ID.
      VITE_SENTRY_RELEASE: ${{ github.sha }}
      CYB_ASC_KEY_ID: ${{ secrets.CYB_ASC_KEY_ID }}
      CYB_ASC_ISSUER_ID: ${{ secrets.CYB_ASC_ISSUER_ID }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      # Login password for the cyb-mac runner user. The launchd-spawned
      # actions runner can't read this from the local keychain (different
      # security domain than the user's GUI session), so we surface it as
      # a workflow secret. Used to unlock the login keychain and set the
      # codesign partition list before fastlane signs anything.
      MAC_LOGIN_PASSWORD: ${{ secrets.MAC_LOGIN_PASSWORD }}
      # Match auto-detects this env var and uses it for keychain ops
      # (unlock + set-key-partition-list after import).
      MATCH_KEYCHAIN_PASSWORD: ${{ secrets.MAC_LOGIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Pre-job cleanup (DerivedData, fastlane build dir, sim caches)
        # The runner Mac is single-tenant, so DerivedData + fastlane build
        # output accumulates GB/run across builds. Nuke anything older than
        # 2 days so disk usage stays bounded without losing the warm cache
        # for back-to-back PRs.
        run: |
          set +e
          find ~/Library/Developer/Xcode/DerivedData -mindepth 1 -maxdepth 1 -mtime +2 -exec rm -rf {} +
          find /Users/jon/actions-runner/_work/CookYourBooks/CookYourBooks/apps/mobile/ios/build -mindepth 1 -mtime +2 -exec rm -rf {} + 2>/dev/null
          # Pre-flight: confirm the login keychain is unlocked. The
          # LaunchAgent at scripts/runner/app.cookyourbooks.unlock-keychain.plist
          # should keep it unlocked across reboots; this surfaces a clear
          # error if it isn't (instead of an opaque codesign failure later).
          if ! security find-identity -v -p codesigning ~/Library/Keychains/login.keychain-db | grep -q 'Apple Distribution'; then
            echo "::warning::Apple Distribution identity not visible in login keychain. Run scripts/runner/install-launch-agents.sh."
          fi
          df -h / | tail -1
          true

      # The runner Mac has nvm under /usr/local/opt/nvm (Homebrew). pnpm
      # comes from corepack which is bundled with Node 20.
      - name: Activate Node 20 + pnpm
        run: |
          export NVM_DIR="/usr/local/opt/nvm"
          . "$NVM_DIR/nvm.sh"
          nvm use 20 --delete-prefix >/dev/null
          echo "$(dirname "$(which node)")" >> "$GITHUB_PATH"

      - name: Write .env.local with Supabase config
        # Mobile builds bake the hosted Supabase creds into the bundle.
        run: |
          cat > apps/web/.env.local <<EOF
          VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
          VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
          EOF

      - name: Decode App Store Connect API key (.p8)
        # The .p8 PEM file can't be stored directly as a secret (newlines
        # get mangled). Store the base64-encoded contents in
        # CYB_ASC_KEY_P8_BASE64 and decode at job start.
        run: |
          mkdir -p "$RUNNER_TEMP/asc"
          echo "${{ secrets.CYB_ASC_KEY_P8_BASE64 }}" | base64 --decode \
            > "$RUNNER_TEMP/asc/AuthKey_${CYB_ASC_KEY_ID}.p8"
          echo "CYB_ASC_KEY_PATH=$RUNNER_TEMP/asc/AuthKey_${CYB_ASC_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install fastlane plugins (via bundler)
        # Brew-installed fastlane doesn't carry plugin gems on its path,
        # so we vendor them per-job via Gemfile + Gemfile.lock. Bundler
        # itself ships with brew Ruby — system Ruby 2.6 is too old for
        # modern fastlane (>=2.7).
        working-directory: apps/mobile/ios
        run: |
          env -u GEM_PATH -u GEM_HOME -u RUBY_VERSION -u MY_RUBY_HOME \
              -u IRBRC -u rvm_path \
            PATH="/usr/local/opt/ruby/bin:$PATH" \
            bundle config set --local path 'vendor/bundle'
          env -u GEM_PATH -u GEM_HOME -u RUBY_VERSION -u MY_RUBY_HOME \
              -u IRBRC -u rvm_path \
            PATH="/usr/local/opt/ruby/bin:$PATH" \
            bundle install --jobs 4

      - name: Build web + cap sync
        # `cap sync` runs `pod install` against the committed ios/ project.
        # `env -u` strips RVM vars so brew's pod doesn't follow them into
        # an RVM ruby that doesn't have the right gems installed.
        run: |
          env -u GEM_PATH -u GEM_HOME -u RUBY_VERSION -u MY_RUBY_HOME \
              -u IRBRC -u rvm_path \
            pnpm --filter @cookyourbooks/mobile sync

      - name: Regenerate icons + splashes
        run: pnpm --filter @cookyourbooks/mobile assets || true

      - name: PR / dispatch=ios — unsigned simulator build (sanity)
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.platform == 'ios')
        working-directory: apps/mobile/ios/App
        # Smoke-only Debug archive. Real release archives go through
        # `fastlane beta` below on push to main.
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ./ci-build \
            build

      - name: Unlock keychain + apply codesign partition list
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # The launchd-spawned actions runner inherits a security domain
        # where the login keychain may be locked. Unlock it explicitly
        # and re-apply the partition list so codesign can use the
        # private key non-interactively. Match's `keychain_password`
        # parameter is supposed to do this during the .p12 import, but
        # we've observed it failing silently — this is the reliable
        # fallback.
        run: |
          security unlock-keychain -p "$MAC_LOGIN_PASSWORD" ~/Library/Keychains/login.keychain-db
          security set-keychain-settings -l ~/Library/Keychains/login.keychain-db
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$MAC_LOGIN_PASSWORD" \
            ~/Library/Keychains/login.keychain-db >/dev/null 2>&1 || true
          security find-identity -v -p codesigning ~/Library/Keychains/login.keychain-db | head -3

      - name: Push to main — fastlane beta (TestFlight)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: apps/mobile/ios
        run: |
          env -u GEM_PATH -u GEM_HOME -u RUBY_VERSION -u MY_RUBY_HOME \
              -u IRBRC -u rvm_path \
            PATH="/usr/local/opt/ruby/bin:$PATH" \
            bundle exec fastlane beta

      - name: Dispatch=ios-release — fastlane release (App Store submit)
        if: github.event_name == 'workflow_dispatch' && inputs.platform == 'ios-release'
        working-directory: apps/mobile/ios
        run: |
          env -u GEM_PATH -u GEM_HOME -u RUBY_VERSION -u MY_RUBY_HOME \
              -u IRBRC -u rvm_path \
            PATH="/usr/local/opt/ruby/bin:$PATH" \
            bundle exec fastlane release

      - name: Clean up decoded ASC key
        if: always()
        run: rm -f "$RUNNER_TEMP/asc/AuthKey_${CYB_ASC_KEY_ID}.p8"

  android:
    name: Build Android
    if: github.event_name == 'workflow_dispatch' && inputs.platform == 'android'
    runs-on: ripley-cloud-linux-x64
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # pnpm version resolved from root package.json's `packageManager`.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Turbo outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          # Key on any file Gradle actually reads — wrappers, version
          # catalogs, and build scripts. restore-keys lets us reuse a
          # stale cache for unchanged deps.
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build web + cap sync
        run: pnpm --filter @cookyourbooks/mobile sync

      - name: Scaffold Android project if missing
        run: |
          if [ ! -d apps/mobile/android ]; then
            pnpm --filter @cookyourbooks/mobile exec cap add android
          fi

      - name: Regenerate icons + splashes
        run: pnpm --filter @cookyourbooks/mobile assets || true

      - name: Gradle debug build
        working-directory: apps/mobile/android
        # Debug build only — signing keys for release are not on CI.
        # `assembleDebug` verifies the native project compiles end-to-end.
        run: ./gradlew assembleDebug --no-daemon
