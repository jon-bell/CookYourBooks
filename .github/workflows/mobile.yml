name: Mobile

on:
  # Mobile native builds require Xcode (iOS) or the Android SDK, which we
  # only want to pay for when the native wrapper actually changes.
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'apps/web/src/import/camera.ts'
      - 'apps/web/src/share/share.ts'
      - 'apps/web/src/pages/CookModePage.tsx'
      - '.github/workflows/mobile.yml'
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'apps/web/src/import/camera.ts'
      - 'apps/web/src/share/share.ts'
      - 'apps/web/src/pages/CookModePage.tsx'
      - '.github/workflows/mobile.yml'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Native platform to build'
        required: true
        default: sync
        type: choice
        options: [sync, ios, ios-release, android]

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  capacitor-sync:
    name: Capacitor sync (Linux)
    runs-on: ripley-cloud-linux-x64
    timeout-minutes: 15
    # Always runs on push/PR. Confirms the web build + capacitor config
    # stay consistent without needing Xcode or the Android SDK.
    steps:
      - uses: actions/checkout@v4

      # pnpm version resolved from root package.json's `packageManager`.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Turbo outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter @cookyourbooks/web build

      - name: Capacitor sync (no platform)
        # `cap sync` without native projects under `ios/` or `android/`
        # prints skip warnings but still validates capacitor.config.ts and
        # the webDir reference. Exits 0 as long as the config parses.
        run: pnpm --filter @cookyourbooks/mobile exec cap sync

  ios:
    name: Build iOS (signed, ship to TestFlight on push to main)
    # Runs on:
    #   - PRs touching mobile code  → unsigned simulator build (sanity check)
    #   - push to main              → fastlane beta (auto-ship to TestFlight)
    #   - workflow_dispatch=ios     → same as PR (unsigned simulator)
    #   - workflow_dispatch=ios-release → fastlane release (App Store submit)
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'ios' || inputs.platform == 'ios-release'))
    runs-on: [self-hosted, macOS, X64, cyb-mac]
    timeout-minutes: 45
    env:
      LANG: en_US.UTF-8
      # Fastlane secrets — see .github/RUNNERS.md for how these are stored.
      # Pod/fastlane steps below prefix commands with `env -u GEM_PATH -u
      # GEM_HOME -u RUBY_VERSION -u MY_RUBY_HOME -u IRBRC -u rvm_path` to
      # strip RVM pollution that breaks brew-installed cocoapods/fastlane.
      # We can't blank these at the job level (empty string ≠ unset; an
      # empty GEM_PATH stops Ruby from finding minitest under cocoapods).
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      CYB_ASC_KEY_ID: ${{ secrets.CYB_ASC_KEY_ID }}
      CYB_ASC_ISSUER_ID: ${{ secrets.CYB_ASC_ISSUER_ID }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      # The runner Mac has nvm under /usr/local/opt/nvm (Homebrew). pnpm
      # comes from corepack which is bundled with Node 20.
      - name: Activate Node 20 + pnpm
        run: |
          export NVM_DIR="/usr/local/opt/nvm"
          . "$NVM_DIR/nvm.sh"
          nvm use 20 --delete-prefix >/dev/null
          echo "$(dirname "$(which node)")" >> "$GITHUB_PATH"

      - name: Write .env.local with Supabase config
        # Mobile builds bake the hosted Supabase creds into the bundle.
        run: |
          cat > apps/web/.env.local <<EOF
          VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
          VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
          EOF

      - name: Decode App Store Connect API key (.p8)
        # The .p8 PEM file can't be stored directly as a secret (newlines
        # get mangled). Store the base64-encoded contents in
        # CYB_ASC_KEY_P8_BASE64 and decode at job start.
        run: |
          mkdir -p "$RUNNER_TEMP/asc"
          echo "${{ secrets.CYB_ASC_KEY_P8_BASE64 }}" | base64 --decode \
            > "$RUNNER_TEMP/asc/AuthKey_${CYB_ASC_KEY_ID}.p8"
          echo "CYB_ASC_KEY_PATH=$RUNNER_TEMP/asc/AuthKey_${CYB_ASC_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build web + cap sync
        # `cap sync` runs `pod install` against the committed ios/ project.
        # `env -u` strips RVM vars so brew's pod doesn't follow them into
        # an RVM ruby that doesn't have the right gems installed.
        run: |
          env -u GEM_PATH -u GEM_HOME -u RUBY_VERSION -u MY_RUBY_HOME \
              -u IRBRC -u rvm_path \
            pnpm --filter @cookyourbooks/mobile sync

      - name: Regenerate icons + splashes
        run: pnpm --filter @cookyourbooks/mobile assets || true

      - name: PR / dispatch=ios — unsigned simulator build (sanity)
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.platform == 'ios')
        working-directory: apps/mobile/ios/App
        # Smoke-only Debug archive. Real release archives go through
        # `fastlane beta` below on push to main.
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ./ci-build \
            build

      - name: Push to main — fastlane beta (TestFlight)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: apps/mobile/ios
        run: |
          env -u GEM_PATH -u GEM_HOME -u RUBY_VERSION -u MY_RUBY_HOME \
              -u IRBRC -u rvm_path \
            fastlane beta

      - name: Dispatch=ios-release — fastlane release (App Store submit)
        if: github.event_name == 'workflow_dispatch' && inputs.platform == 'ios-release'
        working-directory: apps/mobile/ios
        run: |
          env -u GEM_PATH -u GEM_HOME -u RUBY_VERSION -u MY_RUBY_HOME \
              -u IRBRC -u rvm_path \
            fastlane release

      - name: Clean up decoded ASC key
        if: always()
        run: rm -f "$RUNNER_TEMP/asc/AuthKey_${CYB_ASC_KEY_ID}.p8"

  android:
    name: Build Android
    if: github.event_name == 'workflow_dispatch' && inputs.platform == 'android'
    runs-on: ripley-cloud-linux-x64
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # pnpm version resolved from root package.json's `packageManager`.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Turbo outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          # Key on any file Gradle actually reads — wrappers, version
          # catalogs, and build scripts. restore-keys lets us reuse a
          # stale cache for unchanged deps.
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build web + cap sync
        run: pnpm --filter @cookyourbooks/mobile sync

      - name: Scaffold Android project if missing
        run: |
          if [ ! -d apps/mobile/android ]; then
            pnpm --filter @cookyourbooks/mobile exec cap add android
          fi

      - name: Regenerate icons + splashes
        run: pnpm --filter @cookyourbooks/mobile assets || true

      - name: Gradle debug build
        working-directory: apps/mobile/android
        # Debug build only — signing keys for release are not on CI.
        # `assembleDebug` verifies the native project compiles end-to-end.
        run: ./gradlew assembleDebug --no-daemon
