name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Manual trigger for sanity checks outside of PR flow.
  workflow_dispatch:

# A later push cancels any still-running CI for the same ref. Saves the
# runner pool from stacking up when someone force-pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, unit, E2E, build
    # Linux workloads land on the `ripley-cloud-linux-x64` ARC scale set.
    # See `.github/RUNNERS.md` for the label → runner mapping.
    runs-on: ripley-cloud-linux-x64
    timeout-minutes: 30

    env:
      # Forces Playwright's reporter into html + list; tests already check
      # this to turn retries on.
      CI: "true"
      # Skip Playwright's bundled-browser auto-download; we manage them
      # explicitly below so the cache is shared across CI jobs.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "0"
      # The vendored Supabase CLI is at ./.bin/supabase (checked in).
      SUPABASE_CLI: ./.bin/supabase

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        # Version is read from `packageManager` in the root package.json.
        # `pnpm/action-setup@v4` refuses an explicit `version:` when
        # `packageManager` is set — keep package.json as the source of truth.
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # setup-node wires `actions/cache` for the pnpm store behind the
          # scenes, keyed on pnpm-lock.yaml.
          cache: pnpm

      # Turbo's local cache persists build/test task outputs. On a warm
      # runner we skip work for unchanged packages — most re-runs of `main`
      # after a doc-only change finish in seconds.
      - name: Cache Turbo outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # Playwright's managed browsers are ~300MB. Keyed on the lockfile —
      # whenever @playwright/test moves, the cache invalidates and the
      # post-install step re-downloads. `restore-keys` keeps us on the
      # most recent previous cache when the lockfile churns for other deps.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        # --frozen-lockfile fails the job if pnpm-lock.yaml drifted.
        run: pnpm install --frozen-lockfile

      - name: Install vendored Supabase CLI
        # The CLI binary is gitignored — fetch it into ./.bin/. Subsequent
        # runs with a warm runner skip the re-download.
        run: scripts/install-supabase-cli.sh

      - name: Typecheck (all packages)
        run: pnpm -w typecheck

      - name: Unit tests (domain + db + web)
        run: pnpm -w test

      - name: Build web
        # Catch real build-time breakage (tsc -b) before the slower E2E pass.
        run: pnpm --filter @cookyourbooks/web build

      # ---- End-to-end tests -------------------------------------------------

      - name: Install Playwright browsers
        # Full `playwright install` is a no-op when the cache hit restored
        # `~/.cache/ms-playwright`. `--with-deps` still runs to ensure the
        # apt dependencies are present on a new runner image.
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            pnpm --filter @cookyourbooks/web exec playwright install --with-deps chromium
          else
            pnpm --filter @cookyourbooks/web exec playwright install-deps chromium
          fi

      - name: Start local Supabase
        # The CLI manages docker-compose under the hood. Ports are the
        # project's 54420-range (see supabase/config.toml), so this won't
        # collide with other runners if they live on separate hosts.
        run: ${{ env.SUPABASE_CLI }} start

      - name: Run Playwright E2E
        run: pnpm --filter @cookyourbooks/web exec playwright test --reporter=line

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_attempt }}
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Upload Playwright trace/video artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ github.run_attempt }}
          path: apps/web/test-results/
          retention-days: 14

      - name: Supabase logs on failure
        if: failure()
        run: |
          echo "::group::auth"
          docker logs supabase_auth_CookYourBooks 2>&1 | tail -200 || true
          echo "::endgroup::"
          echo "::group::db"
          docker logs supabase_db_CookYourBooks 2>&1 | tail -200 || true
          echo "::endgroup::"
          echo "::group::realtime"
          docker logs supabase_realtime_CookYourBooks 2>&1 | tail -200 || true
          echo "::endgroup::"
          echo "::group::kong"
          docker logs supabase_kong_CookYourBooks 2>&1 | tail -200 || true
          echo "::endgroup::"

      - name: Stop local Supabase
        # `if: always()` so this runs even if a prior step failed; leaving
        # containers up would block the next job on the same runner.
        if: always()
        run: ${{ env.SUPABASE_CLI }} stop --no-backup || true
