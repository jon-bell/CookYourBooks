name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Manual trigger for sanity checks outside of PR flow.
  workflow_dispatch:

# A later push cancels any still-running CI for the same ref. Saves the
# runner pool from stacking up when someone force-pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, unit, E2E, build
    # Linux workloads land on the `ripley-cloud-linux-x64` ARC scale set.
    # See `.github/RUNNERS.md` for the label → runner mapping.
    runs-on: ripley-cloud-linux-x64
    timeout-minutes: 30

    env:
      # Forces Playwright's reporter into html + list; tests already check
      # this to turn retries on.
      CI: "true"
      # Skip Playwright's bundled-browser auto-download; we manage them
      # explicitly below so the cache is shared across CI jobs.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "0"
      # The vendored Supabase CLI is at ./.bin/supabase (checked in).
      SUPABASE_CLI: ./.bin/supabase

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        # Version is read from `packageManager` in the root package.json.
        # `pnpm/action-setup@v4` refuses an explicit `version:` when
        # `packageManager` is set — keep package.json as the source of truth.
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # setup-node wires `actions/cache` for the pnpm store behind the
          # scenes, keyed on pnpm-lock.yaml.
          cache: pnpm

      # Turbo's local cache persists build/test task outputs. On a warm
      # runner we skip work for unchanged packages — most re-runs of `main`
      # after a doc-only change finish in seconds.
      - name: Cache Turbo outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # Playwright's managed browsers are ~300MB. Keyed on the lockfile —
      # whenever @playwright/test moves, the cache invalidates and the
      # post-install step re-downloads. `restore-keys` keeps us on the
      # most recent previous cache when the lockfile churns for other deps.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        # --frozen-lockfile fails the job if pnpm-lock.yaml drifted.
        run: pnpm install --frozen-lockfile

      - name: Install vendored Supabase CLI
        # The CLI binary is gitignored — fetch it into ./.bin/. Subsequent
        # runs with a warm runner skip the re-download.
        run: scripts/install-supabase-cli.sh

      - name: Typecheck (all packages)
        run: pnpm -w typecheck

      - name: Unit tests (domain + db + web)
        run: pnpm -w test

      # Supabase has to start *before* the web build — Vite inlines
      # `VITE_SUPABASE_URL` / `VITE_SUPABASE_ANON_KEY` at build time, and
      # the app throws on module load if they're missing. Locally those
      # come from `apps/web/.env.local`, which is gitignored; on CI we
      # ask the running stack for them.
      - name: Start local Supabase
        # The CLI manages docker-compose under the hood. Ports are the
        # project's 54420-range (see supabase/config.toml), so this won't
        # collide with other runners if they live on separate hosts.
        run: ${{ env.SUPABASE_CLI }} start

      - name: Write apps/web/.env.local from the running stack
        # Vite reads this at build time. Contents live only on the
        # runner's scratch disk; the file is gitignored.
        run: |
          set -eo pipefail
          status_json=$(${{ env.SUPABASE_CLI }} status --output json)
          api_url=$(printf '%s' "$status_json" | node -e \
            'let i=""; process.stdin.on("data",d=>i+=d).on("end",()=>console.log(JSON.parse(i).API_URL))')
          anon_key=$(printf '%s' "$status_json" | node -e \
            'let i=""; process.stdin.on("data",d=>i+=d).on("end",()=>console.log(JSON.parse(i).ANON_KEY))')
          cat > apps/web/.env.local <<EOF
          VITE_SUPABASE_URL=$api_url
          VITE_SUPABASE_ANON_KEY=$anon_key
          EOF
          echo "Wrote apps/web/.env.local (VITE_SUPABASE_URL=$api_url, key len=${#anon_key})"

      - name: Build web
        # Now the env is populated, the bundle has the right backend URL
        # baked in and `supabase.ts`'s module-load check passes.
        run: pnpm --filter @cookyourbooks/web build

      # ---- End-to-end tests -------------------------------------------------

      - name: Install Playwright browsers
        # Full `playwright install` is a no-op when the cache hit restored
        # `~/.cache/ms-playwright`. `--with-deps` still runs to ensure the
        # apt dependencies are present on a new runner image.
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            pnpm --filter @cookyourbooks/web exec playwright install --with-deps chromium
          else
            pnpm --filter @cookyourbooks/web exec playwright install-deps chromium
          fi

      - name: Wait for Supabase services to be ready
        # `supabase start` returns as soon as container healthchecks pass,
        # but in practice PostgREST needs a moment more to pick up the
        # migrated schema and GoTrue to finish its own migrations.
        # Polling each public endpoint until it answers cleanly catches
        # the "started but not actually ready" window before Playwright
        # fires its first request. On failure, print docker status so the
        # log has the full picture.
        run: |
          set -eo pipefail
          status_json=$(${{ env.SUPABASE_CLI }} status --output json)
          api_url=$(printf '%s' "$status_json" | node -e \
            'let i=""; process.stdin.on("data",d=>i+=d).on("end",()=>console.log(JSON.parse(i).API_URL))')
          anon_key=$(printf '%s' "$status_json" | node -e \
            'let i=""; process.stdin.on("data",d=>i+=d).on("end",()=>console.log(JSON.parse(i).ANON_KEY))')
          echo "api_url=$api_url"

          probe() {
            local label="$1" url="$2" expect_code="$3"
            echo "::group::probe $label"
            local code=000
            for i in $(seq 1 60); do
              code=$(curl -sS -o /tmp/probe.out -w '%{http_code}' \
                -H "apikey: $anon_key" \
                -H "Authorization: Bearer $anon_key" \
                --max-time 3 \
                "$url" || echo 000)
              if [ "$code" = "$expect_code" ]; then
                echo "$label ready after ${i}s (HTTP $code)"
                echo "::endgroup::"
                return 0
              fi
              sleep 1
            done
            echo "::error::$label never became ready — last HTTP=$code"
            echo "---- last body ----"
            cat /tmp/probe.out || true
            echo "---- docker ps ----"
            docker ps --format 'table {{.Names}}\t{{.Status}}' || true
            echo "::endgroup::"
            return 1
          }

          # PostgREST: any query against a known table proves the schema
          # is loaded and RLS is resolving. Expect a 200 empty array.
          probe "postgrest"     "$api_url/rest/v1/recipe_collections?select=id&limit=0" 200
          # Auth: /settings is public and cheap.
          probe "auth"          "$api_url/auth/v1/settings"                             200
          # Storage: listing buckets returns 200 (RLS filters the body to
          # `[]` for anon; we just need to know the service is answering).
          probe "storage"       "$api_url/storage/v1/bucket"                            200

      - name: Run Playwright E2E
        # Hard 12-minute wrapper so a total hang still produces logs and
        # artifacts inside the 30-minute job budget. `timeout --foreground`
        # sends SIGTERM first and lets Playwright flush its HTML report
        # before exit.
        run: |
          timeout --foreground --signal=TERM --kill-after=30s 720 \
            pnpm --filter @cookyourbooks/web exec playwright test --reporter=line
        # Surface a timeout separately from test failure so the failure
        # triage step picks the right path below.
        timeout-minutes: 15

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_attempt }}
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Upload Playwright trace/video artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ github.run_attempt }}
          path: apps/web/test-results/
          retention-days: 14

      - name: Supabase logs on failure
        if: failure()
        run: |
          echo "::group::auth"
          docker logs supabase_auth_CookYourBooks 2>&1 | tail -200 || true
          echo "::endgroup::"
          echo "::group::db"
          docker logs supabase_db_CookYourBooks 2>&1 | tail -200 || true
          echo "::endgroup::"
          echo "::group::realtime"
          docker logs supabase_realtime_CookYourBooks 2>&1 | tail -200 || true
          echo "::endgroup::"
          echo "::group::kong"
          docker logs supabase_kong_CookYourBooks 2>&1 | tail -200 || true
          echo "::endgroup::"

      - name: Stop local Supabase
        # `if: always()` so this runs even if a prior step failed; leaving
        # containers up would block the next job on the same runner.
        if: always()
        run: ${{ env.SUPABASE_CLI }} stop --no-backup || true
